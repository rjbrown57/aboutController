apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: aboutcontroller

build:
  local:
    push: false
    useBuildkit: true
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
  artifacts:
    - image: ghcr.io/rjbrown57/aboutcontroller
      docker:
        dockerfile: Dockerfile

manifests:
  kustomize:
    paths:
      - config/default

deploy:
  kubectl: {}
  kubeContext: kind-basic-kind

profiles:
  - name: kind
    activation:
      - kubeContext: kind-basic-kind
