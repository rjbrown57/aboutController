apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aboutcontroller-example-statefulset
  labels:
    app.kubernetes.io/name: aboutcontroller-example-statefulset
  annotations:
    aboutcontroller.io/statefulset-name: "example-db"
    aboutcontroller.io/statefulset-version: "v4.5.6"
spec:
  serviceName: aboutcontroller-example-statefulset
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aboutcontroller-example-statefulset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aboutcontroller-example-statefulset
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
