apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aboutcontroller-example-daemonset
  labels:
    app.kubernetes.io/name: aboutcontroller-example-daemonset
  annotations:
    aboutcontroller.io/daemonset-app-name: "example-agent"
    aboutcontroller.io/daemonset-app-version: "v7.8.9"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aboutcontroller-example-daemonset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aboutcontroller-example-daemonset
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
