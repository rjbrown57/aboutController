apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aboutcontroller.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - about.k8s.io
  resources:
  - ClusterProperty
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - about.k8s.io
  resources:
  - ClusterProperty/finalizers
  verbs:
  - update
- apiGroups:
  - about.k8s.io
  resources:
  - ClusterProperty/status
  verbs:
  - delete
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets/finalizers
  - deployments/finalizers
  - statefulsets/finalizers
  verbs:
  - update
- apiGroups:
  - apps
  resources:
  - daemonsets/status
  - deployments/status
  - statefulsets/status
  verbs:
  - get
  - patch
  - update
