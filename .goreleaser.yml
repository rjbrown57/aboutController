version: 2
before:
  hooks:
    - go mod tidy
builds:
  - 
    main: ./cmd/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-X github.com/rjbrown57/aboutcontroller/cmd.Version={{.Version}}"
archives:
  - formats: ['binary']
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
release:
  github:
    owner: rjbrown57
    name: aboutController
